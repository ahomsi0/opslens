services:
  postgres:
    image: postgres:16-alpine
    container_name: opslens-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: opslens
      POSTGRES_PASSWORD: opslens
      POSTGRES_DB: opslens
    ports:
      - "5432:5432"
    volumes:
      - opslens_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opslens -d opslens"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  opslens_pgdata:
